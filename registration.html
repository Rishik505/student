<html>
    <head>
        <title>REGISTRATION PAGE</title>
        <link rel="stylesheet" href="mystyle1.css">
    </head>
      <body>
         <form>
            <h1>REGISTRATION PAGE</h1>
          FIRST NAME:
          <input type="text" firstname="firstname"><br><br>
          LAST NAME:
          <input type="text" lastname="lastname"><br><br>
          EMAIL:    
          <input type="email" id="email" name="email"> <input type="submit"><br><br>
          MOBILE NO:
          <input type="tel" name="country_code" value="+91" size="2"> &nbsp; 
          <input type="text" name="mobile" maxlength="10"><br><br>
          GENDER:
          MALE<input type="radio" name="gender"> FEMALE<input type="radio" name="gender"> OTHER<input type="radio" name="gender"><br><br>
          ADDRESS:
          <br> <textarea name="ADDRESS" cols="60" rows="10"></textarea><br><br>
          LANGUAGES:
          <input type="checkbox">java
          <input type="checkbox">python
          <input type="checkbox">os <br><br>
          SUBMIT:
          <input type="button" value="SUBMIT">
         </form>
     </body>
</html>
